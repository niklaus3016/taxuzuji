name: 构建 Android APK (踏序足迹)

on:
  push:
    branches: [ "main" ]
    paths:
      - "android/**"
      - "src/**"
      - "public/**"
      - "index.html"
      - "package*.json"
      - "vite.config.*"
      - "tsconfig*.json"
      - "tailwind.config.*"
      - "postcss.config.*"
      - "capacitor.config.*"
      - ".github/workflows/**"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-apk:
    name: 构建 Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: 前端构建 (Vite)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Capacitor 同步 Web 资源到 Android 工程
        run: npx cap sync android

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: 授予 Gradle Wrapper 执行权限
        working-directory: android
        run: chmod +x ./gradlew

      - name: 构建 Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 上传 APK 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: taxuzuji-apk-debug
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/debug/output-metadata.json
          if-no-files-found: error
          retention-days: 30
