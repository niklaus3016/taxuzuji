name: 构建 Android APK (踏序足迹)

on:
  push:
    branches: [ "main" ]
    paths:
      - "android/**"
      - "src/**"
      - "public/**"
      - "index.html"
      - "package*.json"
      - "vite.config.*"
      - "tsconfig*.json"
      - "tailwind.config.*"
      - "postcss.config.*"
      - "capacitor.config.*"
      - ".github/workflows/**"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-apks:
    name: 构建 Debug + Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 从 GitHub Secrets 还原 Release Keystore
        id: restore_keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          KS_OUT="$RUNNER_TEMP/taxuzuji-release.keystore"
          echo "Writing keystore to: $KS_OUT"
          echo "$KEYSTORE_B64" | base64 -d > "$KS_OUT"
          ls -la "$KS_OUT"
          # 设置后续步骤可读取的绝对路径变量（用 GITHUB_OUTPUT 导出）
          echo "keystore_path=$KS_OUT" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: 前端构建 (Vite)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Capacitor 同步 Web 资源到 Android 工程
        run: npx cap sync android

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: 授予 Gradle Wrapper 执行权限
        working-directory: android
        run: chmod +x ./gradlew

      - name: 同时构建 Debug + Signed Release APK
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ steps.restore_keystore.outputs.keystore_path }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleDebug assembleRelease --no-daemon --stacktrace \
            -PTAXUZUJI_STORE_FILE="$KEYSTORE_PATH" \
            -PTAXUZUJI_STORE_PASSWORD="$KEYSTORE_PASSWORD" \
            -PTAXUZUJI_KEY_ALIAS="$KEY_ALIAS" \
            -PTAXUZUJI_KEY_PASSWORD="$KEY_PASSWORD"

      - name: 列出所有生成的 APK（方便排查）
        run: |
          find android/app/build/outputs/apk -type f -name "*.apk" -o -name "output-metadata.json" | sort

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: taxuzuji-apk-debug
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/debug/output-metadata.json
          if-no-files-found: error
          retention-days: 30

      - name: 上传 Release APK（已签名）
        uses: actions/upload-artifact@v4
        with:
          name: taxuzuji-apk-release-signed
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/release/output-metadata.json
          if-no-files-found: error
          retention-days: 90
